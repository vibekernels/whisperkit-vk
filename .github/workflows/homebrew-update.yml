name: Homebrew Bottle

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-14
            xcode-version: "16.1"
          - runner: macos-15
            xcode-version: "26.2"
          - runner: macos-26
            xcode-version: "26.2"
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode-version }}

      - name: Build
        run: swift build -c release --product whisperkit-cli

      - name: Prepare artifact
        run: |
          mkdir -p artifact
          cp "$(swift build -c release --product whisperkit-cli --show-bin-path)/whisperkit-cli" artifact/whisperkit-vk-cli

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisperkit-vk-cli-${{ matrix.runner }}
          path: artifact/

  bottle:
    if: github.event_name == 'release'
    runs-on: macos-15
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package bottles
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          bottle_tag() {
            case "$1" in
              macos-14) echo "arm64_sonoma" ;;
              macos-15) echo "arm64_sequoia" ;;
              macos-26) echo "arm64_tahoe" ;;
            esac
          }

          BOTTLE_FILES=""
          > bottle_lines.txt

          for RUNNER in macos-14 macos-15 macos-26; do
            TAG=$(bottle_tag "$RUNNER")
            PREFIX="$(pwd)/bottle-${RUNNER}/whisperkit-vk-cli/${VERSION}"

            mkdir -p "${PREFIX}/bin"
            cp "artifacts/whisperkit-vk-cli-${RUNNER}/whisperkit-vk-cli" "${PREFIX}/bin/whisperkit-vk-cli"
            chmod +x "${PREFIX}/bin/whisperkit-vk-cli"

            BOTTLE_NAME="whisperkit-vk-cli-${VERSION}.${TAG}.bottle.tar.gz"
            tar -czf "${BOTTLE_NAME}" -C "bottle-${RUNNER}" whisperkit-vk-cli

            SHA256=$(shasum -a 256 "${BOTTLE_NAME}" | cut -d' ' -f1)
            BOTTLE_FILES="${BOTTLE_FILES} ${BOTTLE_NAME}"
            echo "    sha256 cellar: :any_skip_relocation, ${TAG}: \"${SHA256}\"" >> bottle_lines.txt
          done

          echo "BOTTLE_FILES=${BOTTLE_FILES}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

          # Compute source tarball SHA256 for the formula
          SOURCE_URL="https://github.com/vibekernels/whisperkit-vk/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          SOURCE_SHA256=$(curl -sL "${SOURCE_URL}" | shasum -a 256 | cut -d' ' -f1)
          echo "SOURCE_SHA256=${SOURCE_SHA256}" >> "$GITHUB_ENV"

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" ${BOTTLE_FILES}
          gh release upload "${GITHUB_REF_NAME}" artifacts/whisperkit-vk-cli-macos-15/whisperkit-vk-cli

      - name: Update homebrew-tap formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${TAP_TOKEN}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN secret not set, skipping tap update"
            echo ""
            echo "=========================================="
            echo "Add this to Formula/whisperkit-vk-cli.rb manually:"
            echo "=========================================="
            echo ""
            echo "  bottle do"
            echo "    root_url \"https://github.com/vibekernels/whisperkit-vk/releases/download/${GITHUB_REF_NAME}\""
            cat bottle_lines.txt
            echo "  end"
            exit 0
          fi

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/vibekernels/homebrew-tap.git" tap
          cd tap

          {
            echo 'class WhisperkitVkCli < Formula'
            echo '  desc "On-device speech recognition for Apple Silicon, optimized by vibekernels"'
            echo '  homepage "https://github.com/vibekernels/whisperkit-vk"'
            echo "  url \"https://github.com/vibekernels/whisperkit-vk/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz\""
            echo "  sha256 \"${SOURCE_SHA256}\""
            echo '  license "MIT"'
            echo '  head "https://github.com/vibekernels/whisperkit-vk.git", branch: "main"'
            echo ''
            echo '  bottle do'
            echo "    root_url \"https://github.com/vibekernels/whisperkit-vk/releases/download/${GITHUB_REF_NAME}\""
            cat ../bottle_lines.txt
            echo '  end'
            echo ''
            echo '  depends_on xcode: ["15.0", :build]'
            echo '  depends_on :macos'
            echo ''
            echo '  def install'
            echo '    system "swift", "build", "-c", "release", "--product", "whisperkit-cli"'
            echo '    bin.install ".build/release/whisperkit-cli" => "whisperkit-vk-cli"'
            echo '  end'
            echo ''
            echo '  test do'
            echo '    system bin/"whisperkit-vk-cli", "--help"'
            echo '  end'
            echo 'end'
          } > Formula/whisperkit-vk-cli.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/whisperkit-vk-cli.rb
          git commit -m "Update whisperkit-vk-cli to ${GITHUB_REF_NAME}"
          git push
