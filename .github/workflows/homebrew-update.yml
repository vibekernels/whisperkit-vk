name: Homebrew Bottle

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build -c release --product whisperkit-cli

      - name: Prepare artifact
        run: |
          mkdir -p artifact
          cp "$(swift build -c release --product whisperkit-cli --show-bin-path)/whisperkit-cli" artifact/whisperkit-vk-cli

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisperkit-vk-cli-macos-arm64
          path: artifact/

  bottle:
    if: github.event_name == 'release'
    runs-on: macos-latest
    needs: build-and-test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release --product whisperkit-cli

      - name: Package bottle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PREFIX="$(pwd)/bottle/whisperkit-vk-cli/${VERSION}"

          mkdir -p "${PREFIX}/bin"
          cp "$(swift build -c release --product whisperkit-cli --show-bin-path)/whisperkit-cli" "${PREFIX}/bin/whisperkit-vk-cli"

          # Detect macOS version for bottle tag
          OS_VERSION=$(sw_vers -productVersion | cut -d. -f1)
          case "${OS_VERSION}" in
            15) BOTTLE_TAG="arm64_sequoia" ;;
            14) BOTTLE_TAG="arm64_sonoma" ;;
            13) BOTTLE_TAG="arm64_ventura" ;;
            *)  BOTTLE_TAG="arm64_sonoma" ;;
          esac

          BOTTLE_NAME="whisperkit-vk-cli-${VERSION}.${BOTTLE_TAG}.bottle.tar.gz"
          tar -czf "${BOTTLE_NAME}" -C bottle whisperkit-vk-cli
          echo "BOTTLE_NAME=${BOTTLE_NAME}" >> "$GITHUB_ENV"
          echo "BOTTLE_TAG=${BOTTLE_TAG}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

          SHA256=$(shasum -a 256 "${BOTTLE_NAME}" | cut -d' ' -f1)
          echo "BOTTLE_SHA256=${SHA256}" >> "$GITHUB_ENV"

          # Compute source tarball SHA256 for the formula
          SOURCE_URL="https://github.com/vibekernels/whisperkit-vk/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          SOURCE_SHA256=$(curl -sL "${SOURCE_URL}" | shasum -a 256 | cut -d' ' -f1)
          echo "SOURCE_SHA256=${SOURCE_SHA256}" >> "$GITHUB_ENV"

      - name: Upload bottle to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" "${BOTTLE_NAME}"

      - name: Update homebrew-tap formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${TAP_TOKEN}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN secret not set, skipping tap update"
            echo ""
            echo "=========================================="
            echo "Add this to Formula/whisperkit-vk-cli.rb manually:"
            echo "=========================================="
            echo ""
            echo "  bottle do"
            echo "    root_url \"https://github.com/vibekernels/whisperkit-vk/releases/download/${GITHUB_REF_NAME}\""
            echo "    sha256 cellar: :any_skip_relocation, ${BOTTLE_TAG}: \"${BOTTLE_SHA256}\""
            echo "  end"
            exit 0
          fi

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/vibekernels/homebrew-tap.git" tap
          cd tap

          cat > Formula/whisperkit-vk-cli.rb << 'FORMULA'
          class WhisperkitVkCli < Formula
            desc "On-device speech recognition for Apple Silicon, optimized by vibekernels"
            homepage "https://github.com/vibekernels/whisperkit-vk"
          FORMULA

          cat >> Formula/whisperkit-vk-cli.rb << EOF
            url "https://github.com/vibekernels/whisperkit-vk/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
            sha256 "${SOURCE_SHA256}"
          EOF

          cat >> Formula/whisperkit-vk-cli.rb << 'FORMULA'
            license "MIT"
            head "https://github.com/vibekernels/whisperkit-vk.git", branch: "main"
          FORMULA

          cat >> Formula/whisperkit-vk-cli.rb << EOF

            bottle do
              root_url "https://github.com/vibekernels/whisperkit-vk/releases/download/${GITHUB_REF_NAME}"
              sha256 cellar: :any_skip_relocation, ${BOTTLE_TAG}: "${BOTTLE_SHA256}"
            end
          EOF

          cat >> Formula/whisperkit-vk-cli.rb << 'FORMULA'

            depends_on xcode: ["15.0", :build]
            depends_on :macos

            def install
              system "swift", "build", "-c", "release", "--product", "whisperkit-cli"
              bin.install ".build/release/whisperkit-cli" => "whisperkit-vk-cli"
            end

            test do
              system bin/"whisperkit-vk-cli", "--help"
            end
          end
          FORMULA

          sed -i '' 's/^          //' Formula/whisperkit-vk-cli.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/whisperkit-vk-cli.rb
          git commit -m "Update whisperkit-vk-cli to ${GITHUB_REF_NAME}"
          git push
