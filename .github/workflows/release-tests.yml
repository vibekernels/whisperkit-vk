name: Release Tests

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-test-all-platforms:
    name: "Build and Test All Platforms"
    strategy:
      matrix:
        include:
          - os: macos-14
            xcode-version: "16.1"
          - os: macos-15
            xcode-version: "16.4"
          - os: macos-26
            xcode-version: "26.0"
    uses: ./.github/workflows/unit-tests.yml
    with:
      macos-runner: ${{ matrix.os }}
      xcode-version: ${{ matrix.xcode-version }}
